<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MXDealerAdvantage × Booran Motors</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --mx-purple: #7C3AED;
  --mx-purple-dark: #6D28D9;
  --mx-purple-deeper: #5B21B6;
  --mx-purple-glow: rgba(124, 58, 237, 0.3);
  --mx-pink: #EC4899;
  --mx-pink-glow: rgba(236, 72, 153, 0.2);
  --mx-teal: #14B8A6;
  --mx-teal-glow: rgba(20, 184, 166, 0.15);
  --mx-gold: #FBBF24;
  --mx-bg-primary: #111118;
  --mx-bg-card: #191922;
  --mx-bg-card-hover: #21212E;
  --mx-bg-elevated: #1D1D28;
  --mx-text-primary: #F0F0F5;
  --mx-text-secondary: #9CA3AF;
  --mx-text-muted: #6B7280;
  --mx-border: rgba(124, 58, 237, 0.15);
  --mx-border-subtle: rgba(255, 255, 255, 0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  scroll-snap-type: y proximity;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--mx-bg-primary);
  color: var(--mx-text-primary);
  line-height: 1.6;
  overflow-x: hidden;
}

/* Global Noise Texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* Sections */
section {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 40px;
  z-index: 1;
  scroll-snap-align: start;
}

.section-inner {
  max-width: 1200px;
  width: 100%;
}

/* Typography */
h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  line-height: 1.08;
  letter-spacing: -0.02em;
}

h2 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2rem, 4vw, 3.2rem);
  line-height: 1.15;
  letter-spacing: -0.01em;
}

h3 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 1.15rem;
  letter-spacing: -0.01em;
}

.mono {
  font-family: 'JetBrains Mono', monospace;
}

.label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mx-purple);
}

.gradient-text {
  background: linear-gradient(135deg, var(--mx-purple), var(--mx-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.teal-text {
  color: var(--mx-teal);
}

.gold-text {
  color: var(--mx-gold);
}

/* ===== HERO SECTION ===== */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.hero-bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.4;
  animation: float 20s ease-in-out infinite;
}

.hero-bg-orb.orb-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, var(--mx-purple), transparent 70%);
  top: -10%; right: -5%;
}

.hero-bg-orb.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, var(--mx-pink), transparent 70%);
  bottom: 5%; left: -5%;
  animation-delay: -7s;
}

.hero-bg-orb.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, var(--mx-teal), transparent 70%);
  top: 40%; left: 30%;
  animation-delay: -14s;
  opacity: 0.2;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -30px) scale(1.05); }
  66% { transform: translate(-20px, 20px) scale(0.95); }
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
}

.hero-logo-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.2s;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(124, 58, 237, 0.1);
  border: 1px solid var(--mx-border);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--mx-purple);
  letter-spacing: 0.03em;
}

.hero-badge .dot {
  width: 6px; height: 6px;
  background: var(--mx-teal);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

.hero h1 {
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.4s;
}

.hero-sub {
  font-size: clamp(1.05rem, 2vw, 1.25rem);
  color: var(--mx-text-secondary);
  max-width: 640px;
  line-height: 1.7;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.6s;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1px;
  background: var(--mx-border-subtle);
  border-radius: 16px;
  overflow: hidden;
  max-width: 720px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.8s;
}

.hero-stat {
  background: var(--mx-bg-card);
  padding: 28px 24px;
  text-align: center;
}

.hero-stat .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--mx-teal);
  display: block;
  margin-bottom: 4px;
}

.hero-stat .desc {
  font-size: 0.78rem;
  color: var(--mx-text-muted);
  letter-spacing: 0.02em;
}

/* Booran profile callout */
.booran-profile {
  margin-top: 48px;
  display: flex;
  align-items: center;
  gap: 20px;
  background: linear-gradient(135deg, rgba(124,58,237,0.06), rgba(236,72,153,0.04));
  border: 1px solid var(--mx-border);
  border-radius: 16px;
  padding: 24px 28px;
  max-width: 720px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 1s;
}

.booran-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--mx-purple), var(--mx-pink));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  color: white;
  flex-shrink: 0;
}

.booran-profile-text h3 {
  font-size: 1rem;
  margin-bottom: 4px;
}

.booran-profile-text p {
  font-size: 0.82rem;
  color: var(--mx-text-muted);
  line-height: 1.5;
}

.brand-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.brand-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  font-weight: 500;
  padding: 3px 8px;
  background: rgba(124, 58, 237, 0.1);
  border: 1px solid rgba(124, 58, 237, 0.15);
  border-radius: 4px;
  color: var(--mx-text-secondary);
  letter-spacing: 0.05em;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== PROBLEM SECTION ===== */
.problem-section {
  background: linear-gradient(180deg, var(--mx-bg-primary), #151520);
}

.problem-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: stretch;
  margin-top: 48px;
}

.problem-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  justify-content: space-between;
}

.problem-item {
  display: flex;
  gap: 16px;
  padding: 24px;
  background: rgba(124, 58, 237, 0.04);
  border: 1px solid rgba(124, 58, 237, 0.12);
  border-radius: 12px;
  transition: all 0.3s ease;
  flex: 1;
}

.problem-item:hover {
  background: rgba(124, 58, 237, 0.08);
  border-color: rgba(236, 72, 153, 0.25);
  transform: translateX(4px);
}

.problem-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  flex-shrink: 0;
}

.problem-item h3 {
  font-size: 0.95rem;
  margin-bottom: 4px;
  color: var(--mx-pink);
}

.problem-item p {
  font-size: 0.82rem;
  color: var(--mx-text-muted);
  line-height: 1.5;
}

.solution-preview {
  background: var(--mx-bg-card);
  border: 1px solid var(--mx-border);
  border-radius: 20px;
  padding: 40px;
  position: relative;
  overflow: hidden;
}

.solution-preview::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--mx-purple), var(--mx-pink), var(--mx-teal));
}

.solution-preview .label {
  margin-bottom: 16px;
}

.solution-preview h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.6rem;
  margin-bottom: 20px;
}

.comparison-row {
  display: grid;
  grid-template-columns: 160px 1fr 1fr;
  gap: 16px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--mx-border-subtle);
  font-size: 0.85rem;
}

.comparison-row:last-child { border: none; }

.comparison-row .feature { color: var(--mx-text-secondary); font-weight: 500; }
.comparison-row .old { color: var(--mx-pink); font-weight: 500; opacity: 0.7; text-align: center; }
.comparison-row .new { color: var(--mx-teal); font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; text-align: center; }

/* ===== HOW IT WORKS ===== */
.how-section {
  background: #151520;
}

.pathways {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin-top: 48px;
}

.pathway-card {
  background: var(--mx-bg-card);
  border: 1px solid var(--mx-border-subtle);
  border-radius: 20px;
  padding: 40px;
  position: relative;
  overflow: hidden;
  transition: all 0.4s ease;
}

.pathway-card:hover {
  border-color: var(--mx-border);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(124, 58, 237, 0.1);
}

.pathway-card.preferred {
  border-color: var(--mx-purple);
  background: linear-gradient(160deg, rgba(124,58,237,0.08), var(--mx-bg-card) 40%);
}

.pathway-card.preferred::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--mx-purple), var(--mx-pink));
}

.preferred-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--mx-purple), var(--mx-pink));
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: white;
  margin-bottom: 20px;
}

.pathway-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 3rem;
  font-weight: 700;
  color: rgba(124, 58, 237, 0.12);
  position: absolute;
  top: 20px; right: 28px;
}

.pathway-card h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  margin-bottom: 12px;
}

.pathway-card > p {
  font-size: 0.88rem;
  color: var(--mx-text-secondary);
  margin-bottom: 28px;
  line-height: 1.6;
}

.step-flow {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.step {
  display: flex;
  gap: 14px;
  padding: 12px 0;
  position: relative;
}

.step-dot-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 24px;
  flex-shrink: 0;
}

.step-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--mx-purple);
  border: 2px solid var(--mx-purple-dark);
  flex-shrink: 0;
  margin-top: 4px;
}

.step-line {
  width: 2px;
  flex: 1;
  background: linear-gradient(180deg, var(--mx-purple), transparent);
  margin-top: 4px;
}

.step-content {
  font-size: 0.82rem;
  color: var(--mx-text-secondary);
  line-height: 1.5;
  padding-bottom: 4px;
}

.step-content strong {
  color: var(--mx-text-primary);
  font-weight: 600;
}

/* ===== USP / KICKER ===== */
.usp-section {
  background: linear-gradient(180deg, #151520, var(--mx-bg-primary));
  position: relative;
}

.usp-visual {
  margin-top: 56px;
  position: relative;
}

.usp-flow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  flex-wrap: wrap;
}

.usp-node {
  background: var(--mx-bg-card);
  border: 1px solid var(--mx-border);
  border-radius: 16px;
  padding: 32px 28px;
  text-align: center;
  min-width: 200px;
  max-width: 240px;
  transition: all 0.3s ease;
}

.usp-node:hover {
  border-color: var(--mx-purple);
  transform: scale(1.03);
}

.usp-node.highlight {
  background: linear-gradient(160deg, rgba(20,184,166,0.1), var(--mx-bg-card) 60%);
  border-color: var(--mx-teal);
}

.usp-node .node-icon {
  font-size: 2rem;
  margin-bottom: 12px;
}

.usp-node h3 {
  font-size: 0.95rem;
  margin-bottom: 6px;
}

.usp-node p {
  font-size: 0.78rem;
  color: var(--mx-text-muted);
  line-height: 1.5;
}

.usp-arrow {
  font-size: 1.8rem;
  color: var(--mx-purple);
  padding: 0 12px;
  opacity: 0.6;
}

.usp-kicker {
  margin-top: 56px;
  background: linear-gradient(135deg, rgba(20,184,166,0.08), rgba(124,58,237,0.06));
  border: 1px solid rgba(20, 184, 166, 0.2);
  border-radius: 20px;
  padding: 40px 48px;
  text-align: center;
}

.usp-kicker h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.6rem;
  margin-bottom: 12px;
}

.usp-kicker p {
  font-size: 1rem;
  color: var(--mx-text-secondary);
  max-width: 700px;
  margin: 0 auto;
  line-height: 1.7;
}

.usp-kicker .highlight-stat {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: var(--mx-teal);
}

/* ===== REVENUE SECTION ===== */
.revenue-section {
  background: var(--mx-bg-primary);
}

.revenue-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin-top: 48px;
}

.revenue-card {
  background: var(--mx-bg-card);
  border: 1px solid var(--mx-border-subtle);
  border-radius: 20px;
  padding: 36px;
  transition: all 0.3s ease;
}

.revenue-card:hover {
  border-color: var(--mx-border);
}

.revenue-card .label {
  margin-bottom: 12px;
}

.revenue-card h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  margin-bottom: 8px;
}

.revenue-card > p {
  font-size: 0.85rem;
  color: var(--mx-text-muted);
  margin-bottom: 24px;
}

.big-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 3.2rem;
  font-weight: 700;
  line-height: 1;
}

/* Tier Table */
.tier-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 8px;
}

.tier-table th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mx-text-muted);
  text-align: left;
  padding: 0 12px 8px;
}

.tier-table td {
  padding: 14px 12px;
  font-size: 0.85rem;
  color: var(--mx-text-secondary);
  background: var(--mx-bg-elevated);
}

.tier-table tr td:first-child {
  border-radius: 8px 0 0 8px;
}

.tier-table tr td:last-child {
  border-radius: 0 8px 8px 0;
}

.tier-table .tier-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--mx-purple);
}

.tier-table .tier-rate {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: var(--mx-teal);
  font-size: 1rem;
}

/* Bar Chart */
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 16px;
  height: 200px;
  margin-top: 20px;
  padding-top: 20px;
}

.bar-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  height: 100%;
  justify-content: flex-end;
}

.bar {
  width: 100%;
  border-radius: 8px 8px 4px 4px;
  position: relative;
  min-height: 16px;
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.bar .bar-label {
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 600;
  white-space: nowrap;
}

.bar-group .bar-year {
  font-size: 0.72rem;
  color: var(--mx-text-muted);
  font-weight: 500;
}

/* ===== CONTROL SECTION ===== */
.control-section {
  background: #151520;
}

.control-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 48px;
}

.control-card {
  background: var(--mx-bg-card);
  border: 1px solid var(--mx-border-subtle);
  border-radius: 16px;
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.control-card:hover {
  border-color: var(--mx-border);
  transform: translateY(-2px);
}

.control-card .card-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.control-card h3 {
  margin-bottom: 8px;
}

.control-card p {
  font-size: 0.82rem;
  color: var(--mx-text-muted);
  line-height: 1.6;
}

.control-card .value-tag {
  display: inline-block;
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--mx-teal);
  background: var(--mx-teal-glow);
  padding: 4px 10px;
  border-radius: 6px;
}

/* ===== PROJECTIONS SECTION ===== */
.projections-section {
  background: linear-gradient(180deg, #151520, var(--mx-bg-primary));
}

.projection-table-wrap {
  margin-top: 48px;
  background: var(--mx-bg-card);
  border: 1px solid var(--mx-border);
  border-radius: 20px;
  padding: 36px;
  overflow-x: auto;
}

.projection-table-wrap .label { margin-bottom: 16px; }

.projection-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

.projection-table thead th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mx-text-muted);
  text-align: left;
  padding: 0 16px 16px;
  border-bottom: 1px solid var(--mx-border-subtle);
}

.projection-table tbody td {
  padding: 18px 16px;
  font-size: 0.88rem;
  color: var(--mx-text-secondary);
  border-bottom: 1px solid var(--mx-border-subtle);
}

.projection-table tbody tr:last-child td { border: none; }

.projection-table .emp-size {
  font-weight: 600;
  color: var(--mx-text-primary);
}

.projection-table .money {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  color: var(--mx-teal);
}

.projection-table .money-gold {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: var(--mx-gold);
  font-size: 0.95rem;
}

.projection-note {
  margin-top: 16px;
  font-size: 0.75rem;
  color: var(--mx-text-muted);
  font-style: italic;
}

/* Booran-specific projection */
.booran-projection {
  margin-top: 32px;
  background: linear-gradient(135deg, rgba(251,191,36,0.06), rgba(124,58,237,0.06));
  border: 1px solid rgba(251, 191, 36, 0.2);
  border-radius: 16px;
  padding: 32px 36px;
}

.booran-projection h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  margin-bottom: 16px;
}

.booran-numbers {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.booran-num {
  text-align: center;
}

.booran-num .val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2rem;
  font-weight: 700;
  color: var(--mx-gold);
  display: block;
}

.booran-num .desc {
  font-size: 0.78rem;
  color: var(--mx-text-muted);
  margin-top: 4px;
}

/* ===== WE HANDLE SECTION ===== */
.handle-section {
  background: var(--mx-bg-primary);
}

.handle-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 48px;
}

.handle-item {
  display: flex;
  gap: 16px;
  padding: 24px;
  background: var(--mx-bg-card);
  border: 1px solid var(--mx-border-subtle);
  border-radius: 14px;
  transition: all 0.3s ease;
}

.handle-item:hover {
  border-color: var(--mx-border);
}

.handle-check {
  width: 32px; height: 32px;
  background: rgba(20, 184, 166, 0.1);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--mx-teal);
  font-size: 1rem;
  flex-shrink: 0;
}

.handle-item h3 {
  font-size: 0.92rem;
  margin-bottom: 4px;
}

.handle-item p {
  font-size: 0.8rem;
  color: var(--mx-text-muted);
  line-height: 1.5;
}

/* ===== CTA SECTION ===== */
.cta-section {
  min-height: 70vh;
  background: linear-gradient(180deg, var(--mx-bg-primary), #151520);
  text-align: center;
  position: relative;
}

.cta-section::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(124,58,237,0.12), transparent 60%);
  border-radius: 50%;
  filter: blur(80px);
}

.cta-section h2 {
  margin-bottom: 20px;
}

.cta-sub {
  font-size: 1.1rem;
  color: var(--mx-text-secondary);
  max-width: 560px;
  margin: 0 auto 40px;
  line-height: 1.7;
}

.cta-contact {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  background: var(--mx-bg-card);
  border: 1px solid var(--mx-border);
  border-radius: 20px;
  padding: 32px 48px;
}

.cta-contact .name {
  font-family: 'DM Serif Display', serif;
  font-size: 1.2rem;
}

.cta-contact .role {
  font-size: 0.82rem;
  color: var(--mx-text-muted);
}

.cta-links {
  display: flex;
  gap: 24px;
  margin-top: 8px;
}

.cta-links a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: var(--mx-purple);
  text-decoration: none;
  transition: color 0.2s;
}

.cta-links a:hover { color: var(--mx-pink); }

.cta-portal {
  margin-top: 32px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--mx-purple), var(--mx-pink));
  color: white;
  padding: 14px 32px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 0.9rem;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 8px 32px rgba(124, 58, 237, 0.3);
}

.cta-portal:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(124, 58, 237, 0.4);
}

.cta-footer {
  margin-top: 64px;
  padding-top: 32px;
  border-top: 1px solid var(--mx-border-subtle);
}

.cta-footer p {
  font-size: 0.72rem;
  color: var(--mx-text-muted);
}

/* ===== CONFIDENTIAL WATERMARK ===== */
.confidential-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: rgba(10, 10, 15, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--mx-border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
  font-size: 0.7rem;
}

.confidential-bar .left {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--mx-text-muted);
}

.confidential-bar .left .lock { color: var(--mx-purple); }

.confidential-bar .right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--mx-text-muted);
  letter-spacing: 0.05em;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  section { padding: 60px 24px; }
  .problem-grid, .pathways, .revenue-grid, .handle-grid { grid-template-columns: 1fr; }
  .control-grid { grid-template-columns: 1fr 1fr; }
  .usp-flow { flex-direction: column; }
  .usp-arrow { transform: rotate(90deg); padding: 6px 0; }
  .booran-numbers { grid-template-columns: 1fr; gap: 16px; }
  .hero-stats { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
  section { padding: 48px 16px; }
  .control-grid { grid-template-columns: 1fr; }
  .hero-stats { grid-template-columns: 1fr; }
  .cta-links { flex-direction: column; gap: 8px; }
}

/* Page break helpers for print/PDF */
@media print {
  section { page-break-after: always; min-height: auto; padding: 40px; }
  .confidential-bar { position: static; }
}
</style>

</head>

<script>
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decrypt(password, payload) {
  var parts = payload.split('.');
  var header = Uint8Array.from(atob(parts[0]), function(c) { return c.charCodeAt(0); });
  var ciphertext = Uint8Array.from(atob(parts[1]), function(c) { return c.charCodeAt(0); });
  var salt = header.slice(0, 16);
  var iv = header.slice(16, 28);
  var authTag = header.slice(28, 44);

  var key = await deriveKey(password, salt);

  // AES-GCM expects ciphertext + authTag concatenated
  var combined = new Uint8Array(ciphertext.length + authTag.length);
  combined.set(ciphertext);
  combined.set(authTag, ciphertext.length);

  var decrypted = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: iv },
    key,
    combined
  );
  return new TextDecoder().decode(decrypted);
}

async function unlock() {
  var pw = document.getElementById('pw-input').value;
  var payload = document.getElementById('encrypted-payload').textContent;
  try {
    var html = await decrypt(pw, payload);
    document.getElementById('pw-gate').style.display = 'none';
    document.body.insertAdjacentHTML('afterbegin', html);
  } catch(e) {
    var err = document.getElementById('pw-err');
    err.style.opacity = '1';
    document.getElementById('pw-input').value = '';
    setTimeout(function() { err.style.opacity = '0'; }, 2000);
  }
}

document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
});
</script>
